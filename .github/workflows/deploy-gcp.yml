name: Deploy API Estresse para GCP

on:
  push:
    branches:
      - main

env:
  PROJECT_ID: FaceDetectionAPI  
  SERVICE_NAME: detector-estresse
  REGION: us-central1

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout do Codigo da Main
      uses: actions/checkout@v4

    - name: Autenticacao no Google Cloud (Sênior via Secrets)
      id: auth
      uses: google-github-actions/auth@v2
      with:
        credentials_json: ${{ secrets.GCP_SA_KEY }}

    - name: Setup do Chassi Google Cloud SDK
      uses: google-github-actions/setup-gcloud@v2
      with:
        project_id: ${{ env.PROJECT_ID }}

    - name: Ligar Autenticacao do Artifact Registry (Docker)
      run: |
        gcloud auth configure-docker us-central1-docker.pkg.dev --quiet

    - name: Build e Push do Motor Docker
      run: |
        IMAGE_URL="us-central1-docker.pkg.dev/${{ env.PROJECT_ID }}/cloud-run-source-deploy/${{ env.SERVICE_NAME }}:${{ github.sha }}"
        docker build -t $IMAGE_URL .
        docker push $IMAGE_URL
        echo "IMAGE_URL=$IMAGE_URL" >> $GITHUB_ENV

    - name: Deploy Serverless no Cloud Run
      run: |
        gcloud run deploy ${{ env.SERVICE_NAME }} \
          --image ${{ env.IMAGE_URL }} \
          --region ${{ env.REGION }} \
          --platform managed \
          --allow-unauthenticated \
          --memory 6Gi \
          --timeout 120s \
          --quiet